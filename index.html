<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="HXwRMKnzO5b9227Hqda2rGde9Vrlco2SrnqJa1FQ7U0" />
<meta charset="UTF-8">
<title>SS Basic Calculator</title>

<meta name="description" content="Free online basic calculator created by Shoubhya. Perform fast calculations easily.">
<meta name="keywords" content="calculator, basic calculator, online calculator">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY FIX */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, slateblue, midnightblue, darkslategray);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* 🔥 TOP ALIGN */
    padding-top: 20px;
}

/* MAIN LAYOUT */
.wrapper {
    display: flex;
    gap: 20px;
}

/* LEFT SECTION */
.left-section {
    width: 200px;
    color: white;
}

/* TITLE */
.left-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* ABOUT */
.about h2 {
    margin: 0;
    font-size: 20px;
}

.about p {
    font-size: 14px;
}

/* CALCULATOR */
.calculator {
    width: 380px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* DISPLAY */
#display {
    width: 100%;
    height: 70px;
    font-size: 28px;
    text-align: right;
    border-radius: 15px;
    padding: 10px;
    background: rgba(0,0,0,0.4);
    color: white;
    border: none;
}

/* BUTTON GRID */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 15px;
}

button {
    padding: 15px;
    border-radius: 50px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

.operator { background: darkorange; }
.equal { background: forestgreen; }
.scientific { background: royalblue; }
.memory { background: mediumpurple; }

/* HISTORY */
.history {
    width: 220px;
    height: 450px;
    background: rgba(0,0,0,0.3);
    color: white;
    padding: 15px;
    border-radius: 15px;
    overflow-y: auto;
}

/* MOBILE FIX */
@media (max-width: 768px) {
    body {
        overflow: hidden;
    }

    .wrapper {
        transform: scale(0.7);
        transform-origin: top center;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left-section">
        <div class="left-title">SS BASIC<br>CALCULATOR</div>

        <div class="about">
            <h2>About This Calculator</h2>
            <p>
                Free scientific calculator with memory, history,
                and functions like sin, cos, tan, log, etc.
            </p>
        </div>
    </div>

    <!-- CENTER -->
    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button onclick="memoryClear()" class="memory">MC</button>
            <button onclick="memoryRecall()" class="memory">MR</button>
            <button onclick="memoryAdd()" class="memory">M+</button>
            <button onclick="memorySub()" class="memory">M-</button>

            <button onclick="clearDisplay()">C</button>
            <button onclick="append('(')">(</button>
            <button onclick="append(')')">)</button>
            <button onclick="append('/')">/</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')" class="operator">*</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('-')" class="operator">-</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('+')" class="operator">+</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
            <button onclick="backspace()">⌫</button>

            <button onclick="append('sin(')" class="scientific">sin</button>
            <button onclick="append('cos(')" class="scientific">cos</button>
            <button onclick="append('tan(')" class="scientific">tan</button>
            <button onclick="append('√(')" class="scientific">√</button>
            <button onclick="append('log(')" class="scientific">log</button>
            <button onclick="append('ln(')" class="scientific">ln</button>
            <button onclick="append('π')" class="scientific">π</button>
            <button onclick="append('e')" class="scientific">e</button>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="history" id="historyBox">
        <b>History</b><hr>
    </div>

</div>

<script>
let display = document.getElementById("display");
let historyBox = document.getElementById("historyBox");
let memory = 0;
let historyList = [];

function append(value) { display.value += value; }
function clearDisplay() { display.value = ""; }
function backspace() { display.value = display.value.slice(0, -1); }

function toRadians(deg) {
    return deg * (Math.PI / 180);
}

function calculate() {
    let expr = display.value;
    try {
        expr = expr.replace(/sin\(/g,"Math.sin(toRadians(")
                   .replace(/cos\(/g,"Math.cos(toRadians(")
                   .replace(/tan\(/g,"Math.tan(toRadians(")
                   .replace(/√\(/g,"Math.sqrt(")
                   .replace(/log\(/g,"Math.log10(")
                   .replace(/ln\(/g,"Math.log(")
                   .replace(/π/g,"Math.PI")
                   .replace(/e/g,"Math.E");

        let result = eval(expr);
        display.value = result;
    } catch {
        display.value = "Error";
    }
}
</script>

</body>
</html>
