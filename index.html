<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="HXwRMKnzO5b9227Hqda2rGde9Vrlco2SrnqJa1FQ7U0" />
<meta charset="UTF-8">
<title>SS Basic Calculator</title>

<meta name="description" content="Free online basic calculator created by Shoubhya.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    /* Using specific color names for the background gradient */
    background: linear-gradient(135deg, SlateBlue, MidnightBlue, DarkSlateGray);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.wrapper {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    justify-content: center;
    width: 95%;
    max-width: 1200px;
}

/* LEFT SECTION */
.left-section {
    width: 250px;
    color: White;
    text-align: left;
}

.left-title {
    font-size: 32px;
    font-weight: bold;
    line-height: 1.5;
    margin-bottom: 15px;
    text-transform: uppercase;
}

.about {
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.9;
}

.about h3 {
    margin-bottom: 5px;
    font-size: 18px;
}

/* CALCULATOR STYLING */
.calculator {
    width: 380px;
    /* Replaced hex with DarkSlateBlue equivalent with transparency */
    background: rgba(72, 61, 139, 0.4); 
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(255, 255, 255, 0.2);
}

#display {
    width: 100%;
    height: 70px;
    font-size: 28px;
    text-align: right;
    border: none;
    outline: none;
    border-radius: 15px;
    padding: 10px;
    box-sizing: border-box;
    background: rgba(0,0,0,0.4);
    color: White;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 15px;
}

button {
    padding: 15px;
    font-size: 16px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.2);
    color: White;
    transition: 0.2s;
}

button:hover {
    background: rgba(255, 255, 255, 0.4);
}

/* BUTTON COLOUR NAMES */
.operator { background: DarkOrange; }
.equal { background: ForestGreen; }
.scientific { background: RoyalBlue; }
.memory { background: MediumPurple; }

/* HISTORY PANEL */
.history {
    width: 220px;
    background: rgba(0, 0, 0, 0.3);
    color: White;
    padding: 15px;
    border-radius: 15px;
    height: 450px;
    overflow-y: auto;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.1);
}

.history b {
    font-size: 18px;
    display: block;
    margin-bottom: 10px;
}

.history hr {
    border: 0;
    border-top: 1px solid rgba(255,255,255,0.3);
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="left-section">
        <div class="left-title">
            SS BASIC<br>CALCULATOR
        </div>

        <div class="about">
            <h3>About This Calculator</h3>
            <p>
                This is a free online scientific calculator with memory functions, 
                history tracking, and trigonometric calculations like sin, cos, tan, log, and more.
            </p>
        </div>
    </div>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">

        <div class="buttons">
            <button onclick="memoryClear()" class="memory">MC</button>
            <button onclick="memoryRecall()" class="memory">MR</button>
            <button onclick="memoryAdd()" class="memory">M+</button>
            <button onclick="memorySub()" class="memory">M-</button>

            <button onclick="clearDisplay()">C</button>
            <button onclick="append('(')">(</button>
            <button onclick="append(')')">)</button>
            <button onclick="append('/')">/</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')" class="operator">*</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('-')" class="operator">-</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('+')" class="operator">+</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
            <button onclick="backspace()">⌫</button>

            <button onclick="append('sin(')" class="scientific">sin</button>
            <button onclick="append('cos(')" class="scientific">cos</button>
            <button onclick="append('tan(')" class="scientific">tan</button>
            <button onclick="append('√(')" class="scientific">√</button>
            <button onclick="append('log(')" class="scientific">log</button>
            <button onclick="append('ln(')" class="scientific">ln</button>
            <button onclick="append('π')" class="scientific">π</button>
            <button onclick="append('e')" class="scientific">e</button>
        </div>
    </div>

    <div class="history" id="historyBox">
        <b>History</b>
        <hr>
        <div id="historyContent"></div>
    </div>

</div>

<script>
let display = document.getElementById("display");
let historyContent = document.getElementById("historyContent");
let memory = 0;
let historyList = [];

function append(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = "";
}

function backspace() {
    display.value = display.value.slice(0, -1);
}

// Ensure this is global for eval
window.toRadians = function(deg) {
    return deg * (Math.PI / 180);
};

function calculate() {
    if (!display.value) return;
    
    // Automatic parenthesis closing for sin(90 -> sin(90)
    let openParentheses = (display.value.match(/\(/g) || []).length;
    let closeParentheses = (display.value.match(/\)/g) || []).length;
    while (openParentheses > closeParentheses) {
        display.value += ")";
        closeParentheses++;
    }

    let originalExpr = display.value;
    let expr = originalExpr;

    try {
        // Correct replacement logic
        expr = expr.replace(/sin\(/g, "Math.sin(window.toRadians(");
        expr = expr.replace(/cos\(/g, "Math.cos(window.toRadians(");
        expr = expr.replace(/tan\(/g, "Math.tan(window.toRadians(");
        expr = expr.replace(/√\(/g, "Math.sqrt(");
        expr = expr.replace(/log\(/g, "Math.log10(");
        expr = expr.replace(/ln\(/g, "Math.log(");
        expr = expr.replace(/π/g, "Math.PI");
        expr = expr.replace(/e/g, "Math.E");

        // Important: Close the toRadians parenthesis for trig functions
        // This regex finds the end of the trig function arguments and adds a second ')'
        expr = expr.replace(/(Math\.(sin|cos|tan)\(window\.toRadians\([^)]+)\)/g, "$1))");

        let result = eval(expr);
        
        if (!Number.isInteger(result)) {
            result = parseFloat(result.toFixed(8));
        }

        addHistory(originalExpr + " = " + result);
        display.value = result;

    } catch (e) {
        display.value = "Error";
        setTimeout(() => display.value = "", 1500);
    }
}

function addHistory(item) {
    historyList.push(item);
    if(historyList.length > 10) historyList.shift();
    historyContent.innerHTML = historyList.slice().reverse().join("<br><br>");
}

function memoryClear() { memory = 0; }
function memoryRecall() { display.value += memory; }
function memoryAdd() { memory += Number(display.value) || 0; }
function memorySub() { memory -= Number(display.value) || 0; }
</script>

</body>
</html>
