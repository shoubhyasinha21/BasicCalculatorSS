<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="HXwRMKnzO5b9227Hqda2rGde9Vrlco2SrnqJa1FQ7U0" />
<meta charset="UTF-8">
<title>SS Basic Calculator</title>

<meta name="description" content="Free online basic calculator created by Shoubhya.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #4b44b6, #2d345e, #1a1c2c);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* MAIN LAYOUT */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 30px;
    width: 95%;
    max-width: 1200px;
    position: relative;
}

/* LEFT SECTION */
.left-section {
    width: 250px;
    color: white;
    text-align: left;
}

/* TITLE STYLE */
.left-title {
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: 1px;
    margin-bottom: 15px;
    text-transform: uppercase;
}

/* ABOUT SECTION */
.about {
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.9;
}

.about h3 {
    margin-bottom: 5px;
    font-size: 18px;
}

/* CALCULATOR STYLING */
.calculator {
    width: 380px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    padding: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* SCREEN */
#display {
    width: 100%;
    height: 80px;
    font-size: 32px;
    text-align: right;
    border: none;
    border-radius: 15px;
    padding: 15px;
    background: #000000;
    color: white;
    box-sizing: border-box;
    margin-bottom: 20px;
}

/* BUTTONS GRID */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

button {
    height: 55px;
    border: none;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.15);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
}

button:active {
    transform: scale(0.95);
}

.operator { background: #ff9500; }
.equal { background: #28a745; }
.scientific { background: #3a7bd5; }
.memory { background: #9d81e1; }

/* UPDATED HISTORY PANEL */
.history {
    width: 220px;
    background: rgba(0, 0, 0, 0.3);
    color: White;
    padding: 15px;
    border-radius: 15px;
    height: 450px;
    overflow-y: auto;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.1);
}

.history b {
    font-size: 18px;
    display: block;
    margin-bottom: 10px;
}

.history hr {
    border: 0;
    border-top: 1px solid rgba(255,255,255,0.3);
    margin-bottom: 15px;
}

/* MOBILE RESPONSIVENESS */
@media (max-width: 900px) {
    .wrapper {
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
        padding-top: 50px;
    }
    .left-section {
        width: 100%;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="left-section">
        <div class="left-title">
            SS BASIC<br>CALCULATOR
        </div>

        <div class="about">
            <h3>About This Calculator</h3>
            <p>
                This is a free online scientific calculator with memory functions, 
                history tracking, and trigonometric calculations like sin, cos, tan, log, and more.
            </p>
        </div>
    </div>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">

        <div class="buttons">
            <button onclick="memoryClear()" class="memory">MC</button>
            <button onclick="memoryRecall()" class="memory">MR</button>
            <button onclick="memoryAdd()" class="memory">M+</button>
            <button onclick="memorySub()" class="memory">M-</button>

            <button onclick="clearDisplay()">C</button>
            <button onclick="append('(')">(</button>
            <button onclick="append(')')">)</button>
            <button onclick="append('/')">/</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')" class="operator">*</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('-')" class="operator">-</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('+')" class="operator">+</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
            <button onclick="backspace()">⌫</button>

            <button onclick="append('sin(')" class="scientific">sin</button>
            <button onclick="append('cos(')" class="scientific">cos</button>
            <button onclick="append('tan(')" class="scientific">tan</button>
            <button onclick="append('√(')" class="scientific">√</button>
            <button onclick="append('log(')" class="scientific">log</button>
            <button onclick="append('ln(')" class="scientific">ln</button>
            <button onclick="append('π')" class="scientific">π</button>
            <button onclick="append('e')" class="scientific">e</button>
        </div>
    </div>

    <div class="history" id="historyBox">
        <b>History</b>
        <hr>
        <div id="historyContent"></div>
    </div>

</div>

<script>
let display = document.getElementById("display");
let historyContent = document.getElementById("historyContent");
let memory = 0;
let historyList = [];

function append(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = "";
}

function backspace() {
    display.value = display.value.slice(0, -1);
}

function toRadians(deg) {
    return deg * (Math.PI / 180);
}

function calculate() {
    if (!display.value) return;
    let originalExpr = display.value;
    let expr = originalExpr;

    try {
        expr = expr.replace(/sin\(/g, "Math.sin(toRadians(");
        expr = expr.replace(/cos\(/g, "Math.cos(toRadians(");
        expr = expr.replace(/tan\(/g, "Math.tan(toRadians(");
        expr = expr.replace(/√\(/g, "Math.sqrt(");
        expr = expr.replace(/log\(/g, "Math.log10(");
        expr = expr.replace(/ln\(/g, "Math.log(");
        expr = expr.replace(/π/g, "Math.PI");
        expr = expr.replace(/e/g, "Math.E");

        let result = eval(expr);
        
        if (!Number.isInteger(result)) {
            result = parseFloat(result.toFixed(8));
        }

        addHistory(originalExpr + " = " + result);
        display.value = result;

    } catch {
        display.value = "Error";
        setTimeout(() => display.value = "", 1500);
    }
}

function addHistory(item) {
    historyList.push(item);
    if(historyList.length > 10) historyList.shift();
    historyContent.innerHTML = historyList.slice().reverse().join("<br><br>");
}

function memoryClear() { memory = 0; }
function memoryRecall() { display.value += memory; }
function memoryAdd() { memory += Number(display.value) || 0; }
function memorySub() { memory -= Number(display.value) || 0; }
</script>

</body>
</html>
