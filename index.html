<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="HXwRMKnzO5b9227Hqda2rGde9Vrlco2SrnqJa1FQ7U0" />
<meta charset="UTF-8">
<title>SS Basic Calculator</title>

<meta name="description" content="Free online basic calculator created by Shoubhya.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, slateblue, midnightblue, darkslategray);
}

/* MAIN LAYOUT */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start; /* TOP ALIGN */
    gap: 20px;
    height: 100vh;
    padding-top: 20px;
}

/* LEFT SECTION */
.left-section {
    width: 200px;
    color: white;
}

/* TITLE TOP LEFT */
.left-title {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px; /* GAP BELOW TITLE */
}

/* ABOUT SECTION */
.about {
    font-size: 14px;
    line-height: 1.5;
}

/* CALCULATOR CENTER */
.calculator {
    width: 380px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* DISPLAY */
#display {
    width: 100%;
    height: 70px;
    font-size: 28px;
    text-align: right;
    border: none;
    border-radius: 15px;
    padding: 10px;
    background: rgba(0,0,0,0.4);
    color: white;
}

/* BUTTONS */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 15px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 50px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

.operator { background: DarkOrange; }
.equal { background: ForestGreen; }
.scientific { background: RoyalBlue; }
.memory { background: MediumPurple; }

/* HISTORY RIGHT */
.history {
    width: 220px;
    height: 450px;
    background: rgba(0,0,0,0.3);
    color: white;
    padding: 15px;
    border-radius: 15px;
    overflow-y: auto;
}

/* MOBILE FIX (NO SCROLL) */
@media (max-width: 768px) {
    body {
        overflow: hidden;
    }

    .wrapper {
        transform: scale(0.7);
        transform-origin: top center;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left-section">
        <div class="left-title">
            SS BASIC<br>CALCULATOR
        </div>

        <div class="about">
            <h3>About</h3>
            <p>
                Free online scientific calculator with memory,
                history, and functions like sin, cos, tan, log, etc.
            </p>
        </div>
    </div>

    <!-- CENTER -->
    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button onclick="memoryClear()" class="memory">MC</button>
            <button onclick="memoryRecall()" class="memory">MR</button>
            <button onclick="memoryAdd()" class="memory">M+</button>
            <button onclick="memorySub()" class="memory">M-</button>

            <button onclick="clearDisplay()">C</button>
            <button onclick="append('(')">(</button>
            <button onclick="append(')')">)</button>
            <button onclick="append('/')">/</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')" class="operator">*</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('-')" class="operator">-</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('+')" class="operator">+</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
            <button onclick="backspace()">⌫</button>

            <button onclick="append('sin(')" class="scientific">sin</button>
            <button onclick="append('cos(')" class="scientific">cos</button>
            <button onclick="append('tan(')" class="scientific">tan</button>
            <button onclick="append('√(')" class="scientific">√</button>
            <button onclick="append('log(')" class="scientific">log</button>
            <button onclick="append('ln(')" class="scientific">ln</button>
            <button onclick="append('π')" class="scientific">π</button>
            <button onclick="append('e')" class="scientific">e</button>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="history" id="historyBox">
        <b>History</b><hr>
    </div>

</div>

<script>
let display = document.getElementById("display");
let historyBox = document.getElementById("historyBox");
let memory = 0;
let historyList = [];

function append(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = "";
}

function backspace() {
    display.value = display.value.slice(0, -1);
}

function toRadians(deg) {
    return deg * (Math.PI / 180);
}

function calculate() {
    if (!display.value) return;

    let expr = display.value;

    try {
        expr = expr.replace(/sin\(/g, "Math.sin(toRadians(");
        expr = expr.replace(/cos\(/g, "Math.cos(toRadians(");
        expr = expr.replace(/tan\(/g, "Math.tan(toRadians(");
        expr = expr.replace(/√\(/g, "Math.sqrt(");
        expr = expr.replace(/log\(/g, "Math.log10(");
        expr = expr.replace(/ln\(/g, "Math.log(");
        expr = expr.replace(/π/g, "Math.PI");
        expr = expr.replace(/e/g, "Math.E");

        let result = eval(expr);

        addHistory(display.value + " = " + result);
        display.value = result;

    } catch {
        display.value = "Error";
        setTimeout(() => display.value = "", 1500);
    }
}

function addHistory(item) {
    historyList.push(item);
    if(historyList.length > 10) historyList.shift();
    historyBox.innerHTML = "<b>History</b><hr>" + historyList.slice().reverse().join("<br>");
}

function memoryClear() { memory = 0; }
function memoryRecall() { display.value += memory; }
function memoryAdd() { memory += Number(display.value) || 0; }
function memorySub() { memory -= Number(display.value) || 0; }
</script>

</body>
</html>
